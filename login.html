{% extends 'base.html' %}

{% block content %}
<section class="py-5 bg-light" style="min-height: 80vh;">
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-user-lock fs-1 text-warning mb-3"></i>
                            <h3 class="fw-bold">Staff Login</h3>
                            <p class="text-muted">Access the Appointments List</p>
                        </div>

                        <!-- Flash Messages -->
                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            <div class="alert alert-danger" role="alert">
                                {% for message in messages %}
                                    {{ message }}
                                {% end endfor %}
                            </div>
                          {% endif %}
                        {% endwith %}

                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-warning w-100 fw-bold">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
